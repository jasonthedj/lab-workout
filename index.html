<!DOCTYPE html>
<html>
<head>
  <title>The Lab Superset Builder</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      max-width: 900px;
      margin: 30px auto;
      padding: 14px;
      font-size: 18px;
    }

    h1 {
      color: #E10600;
      font-size: 36px;
      margin-bottom: 10px;
    }

    button {
      background: #E10600;
      color: #fff;
      border: none;
      padding: 18px 22px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin: 10px 0 20px 0;
      border-radius: 8px;
    }

    pre {
      background: #111;
      padding: 20px;
      border: 1px solid #333;
      white-space: pre-wrap;
      font-size: 18px;
      line-height: 1.6;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>The Lab Superset Builder</h1>

<button onclick="generate()">GENERATE WORKOUT</button>

<pre id="output"></pre>

<script>

/* =========================
   BLOCK 1 SYSTEM
========================= */

const hrElevator = [
  "Jump Rope",
  "Assault Bike 30s",
  "Row 250m",
  "SkiErg 30s",
  "Shuttle Runs",
  "Airdyne Sprint",
  "Med Ball Slam Series",
  "Lateral Shuffle",
  "High Knees to Sprint"
];

const plyo = [
  "Pogo Jumps",
  "Lateral Pogos",
  "Line Hops (F/B)",
  "Line Hops (Lateral)",
  "Split Squat Jumps (low amplitude)",
  "Reactive Step-Off + Stick",
  "Skater Bounds (controlled)",
  "Ankling Series",
  "Drop to Stick (low box)",
  "Continuous Ankling to Sprint"
];

const mobility = [
  "90/90 Hip Switches",
  "World’s Greatest Stretch",
  "Cossack Squat Flow",
  "Ankle Rockers",
  "Thoracic Rotations",
  "Hip Flexor Rockbacks",
  "Deep Squat Hold + Reach",
  "Open Book Rotation"
];

/* =========================
   LAB EXERCISE LIBRARY
========================= */

// Push
const upperPush = [
  "DB Bench Press","Incline DB Press","Barbell Bench Press","Landmine Press",
  "Half-Kneeling DB Press","Push-Ups","Weighted Push-Up","Single Arm Landmine Press",
  "KB Floor Press","Standing DB Press","Machine Chest Press","Cable Chest Press"
];

// Pull
const upperPull = [
  "Pull-Ups","Chin-Ups","Lat Pulldown","Chest-Supported DB Row",
  "Single Arm DB Row","TRX Row","Seated Cable Row","Neutral Grip Pulldown",
  "Inverted Row","High Row Machine","Straight Arm Pulldown","Meadows Row"
];

// Knee
const lowerKnee = [
  "Back Squat","Front Squat","Goblet Squat","RFESS",
  "Step-Ups","Reverse Lunge","Trap Bar Squat","Paused Squat",
  "Tempo Split Squat","Hack Squat","Leg Press","Bulgarian Split Squat"
];

// Hip
const lowerHip = [
  "RDL","Barbell Deadlift","Trap Bar Deadlift","Hip Thrust",
  "KB Deadlift","Nordic Hamstring Curl","kBox Deadlift","Single Leg RDL",
  "Good Morning","Cable Pull Through","Glute Bridge","Kettlebell Swing"
];

// Core
const core = [
  "Dead Bug","Plank","Side Plank","Hanging Knee Raise",
  "Pallof Press","Cable Chop","Ab Wheel","Farmer Carry",
  "Suitcase Carry","Toes to Bar","Anti-Rotation Hold","Swiss Ball Rollout"
];

// Conditioning
const finisher = [
  "Sled Push","Sled Drag","Airdyne Sprint","Row Intervals",
  "SkiErg Sprint","Tempo Run","Assault Bike","Shuttle Runs",
  "Hill Sprints","Battle Ropes","Lateral Sled Drag","EMOM Bike Sprints"
];

/* =========================
   MEMORY (last 5 workouts)
========================= */

let history = JSON.parse(localStorage.getItem("history") || "[]");

function pick(arr) {
  let choice;
  let tries = 0;

  do {
    choice = arr[Math.floor(Math.random() * arr.length)];
    tries++;
  } while (history.includes(choice) && tries < 10);

  return choice;
}

/* =========================
   GENERATOR
========================= */

function generate() {

  let workout = "";
  let used = [];

  function safePick(arr) {
    const item = pick(arr);
    used.push(item);
    return item;
  }

  /* BLOCK 1 */
  workout += "BLOCK 1 - PRIMER\n";
  workout += "HR: " + safePick(hrElevator) + "\n";
  workout += "Plyo: " + safePick(plyo) + "\n";
  workout += "Mobility: " + safePick(mobility) + "\n\n";

  /* BLOCK 2 */
  workout += "BLOCK 2 - UPPER SUPERSERIES\n";
  workout += "A1: " + safePick(upperPush) + "\n";
  workout += "A2: " + safePick(upperPull) + "\n";
  workout += "A3: " + safePick(core) + "\n\n";

  /* BLOCK 3 */
  workout += "BLOCK 3 - LOWER SUPERSERIES\n";
  workout += "B1: " + safePick(lowerKnee) + "\n";
  workout += "B2: " + safePick(lowerHip) + "\n";
  workout += "B3: " + safePick(core) + "\n\n";

  /* FINISHER */
  workout += "FINISHER\n";
  workout += "- " + safePick(finisher) + "\n";

  document.getElementById("output").textContent = workout;

  /* SAVE HISTORY */
  history = history.concat(used);

  if (history.length > 60) {
    history = history.slice(history.length - 60);
  }

  localStorage.setItem("history", JSON.stringify(history));
}

</script>

</body>
</html>
