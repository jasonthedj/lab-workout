<!DOCTYPE html>
<html>
<head>
  <title>The Lab Superset Builder</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      max-width: 900px;
      margin: 30px auto;
      padding: 12px;
      font-size: 18px;
    }

    h1 {
      color: #E10600;
      font-size: 34px;
    }

    button {
      background: #E10600;
      color: #fff;
      border: none;
      padding: 18px 22px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-bottom: 20px;
      border-radius: 8px;
    }

    pre {
      background: #111;
      padding: 20px;
      border: 1px solid #333;
      white-space: pre-wrap;
      font-size: 18px;
      line-height: 1.6;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>The Lab Superset Builder</h1>

<button onclick="generate()">GENERATE WORKOUT</button>

<pre id="output"></pre>

<script>

// =====================
// EXPANDED LAB LIBRARY (+10 each category)
// =====================

// PUSH (+10)
const upperPush = [
  "DB Bench Press",
  "Incline DB Press",
  "Barbell Bench Press",
  "Landmine Press",
  "Half-Kneeling DB Press",
  "Push-Ups",
  "Weighted Push-Up",
  "Single Arm Landmine Press",
  "KB Floor Press",
  "Standing DB Press",
  "Machine Chest Press",
  "Decline Push-Up",
  "Cable Chest Press",
  "Explosive Push-Up",
  "Floor Press (Barbell)"
];

// PULL (+10)
const upperPull = [
  "Pull-Ups",
  "Chin-Ups",
  "Lat Pulldown",
  "Chest-Supported DB Row",
  "Single Arm DB Row",
  "TRX Row",
  "Seated Cable Row",
  "Neutral Grip Pulldown",
  "Inverted Row",
  "High Row Machine",
  "Wide Grip Pulldown",
  "Straight Arm Pulldown",
  "Band Assisted Pull-Up",
  "Kneeling Cable Row",
  "Meadows Row"
];

// KNEE (+10)
const lowerKnee = [
  "Back Squat",
  "Front Squat",
  "Goblet Squat",
  "RFESS",
  "Step-Ups",
  "Reverse Lunge",
  "Trap Bar Squat",
  "Paused Squat",
  "Tempo Split Squat",
  "Hack Squat",
  "Leg Press",
  "Box Squat",
  "Bulgarian Split Squat",
  "Walking Lunge",
  "Heel Elevated Squat"
];

// HIP (+10)
const lowerHip = [
  "RDL",
  "Barbell Deadlift",
  "Trap Bar Deadlift",
  "Hip Thrust",
  "KB Deadlift",
  "Nordic Hamstring Curl",
  "kBox Deadlift",
  "Single Leg RDL",
  "Good Morning",
  "Cable Pull Through",
  "Glute Bridge",
  "Band Hip Thrust",
  "Deficit Deadlift",
  "Kettlebell Swing",
  "Reverse Hyper"
];

// CORE (+10)
const core = [
  "Dead Bug",
  "Plank",
  "Side Plank",
  "Hanging Knee Raise",
  "Pallof Press",
  "Cable Chop",
  "Ab Wheel",
  "Farmer Carry",
  "Suitcase Carry",
  "Toes to Bar",
  "Cable Lift",
  "Stir the Pot",
  "Swiss Ball Rollout",
  "Dead Bug March",
  "Anti-Rotation Hold"
];

// CONDITIONING (+10)
const finisher = [
  "Sled Push",
  "Sled Drag",
  "Airdyne Sprint",
  "Row Intervals",
  "SkiErg Sprint",
  "Tempo Run",
  "Assault Bike",
  "Shuttle Runs",
  "Hill Sprints",
  "Battle Ropes",
  "kBox Conditioning Circuit",
  "Farmer Carry March",
  "Med Ball Complex",
  "Lateral Sled Drag",
  "EMOM Bike Sprints"
];

// PRIMER
const primer = [
  "Jump Rope",
  "Med Ball Slams",
  "A-Skips",
  "Pogo Jumps",
  "Lateral Bounds"
];

// =====================
// RANDOM PICK
// =====================
function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// =====================
// GENERATE SUPERSETS
// =====================
function generate() {

  let workout = "";

  workout += "BLOCK 1 - PRIMER\n";
  workout += "- " + pick(primer) + "\n\n";

  workout += "BLOCK 2 - UPPER SUPERSERIES\n";
  workout += "A1: " + pick(upperPush) + "\n";
  workout += "A2: " + pick(upperPull) + "\n";
  workout += "A3: " + pick(core) + "\n\n";

  workout += "BLOCK 3 - LOWER SUPERSERIES\n";
  workout += "B1: " + pick(lowerKnee) + "\n";
  workout += "B2: " + pick(lowerHip) + "\n";
  workout += "B3: " + pick(core) + "\n\n";

  workout += "FINISHER\n";
  workout += "- " + pick(finisher) + " (5–8 min)\n";

  document.getElementById("output").textContent = workout;
}

</script>

</body>
</html>
